<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kairo — Cloud v6.2 (Supabase, White)</title>
  <meta name="theme-color" content="#ffffff" />
  <link rel="stylesheet" href="assets/style.css">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.47.10/dist/umd/supabase.js"></script>
</head>
<body>
  <header>
    <div style="display:flex; align-items:center; gap:10px">
      <strong>Kairo — Cloud v6.2</strong>
      <span id="cloud-status" class="pill">Local</span>
    </div>
    <nav>
      <button data-tab="inventory" class="active">Inventory</button>
      <button data-tab="formulations">Formulations</button>
      <button data-tab="produce">Produce</button>
      <button data-tab="history">History</button>
      <button data-tab="settings">Settings</button>
    </nav>
  </header>
  <main>
    <div id="banner" style="display:none"></div>
    <section id="tab-inventory" class="grid grid-2">
      <div class="card">
        <h2>Add / Update Material</h2>
        <div class="grid">
          <div style="display:grid;gap:10px;grid-template-columns:1fr 1fr">
            <div><label>Name</label><input id="mat-name" placeholder="e.g., Hedione"></div>
            <div><label>Unit</label><select id="mat-unit"><option>ml</option><option>g</option><option>kg</option><option>L</option></select></div>
          </div>
          <div style="display:grid;gap:10px;grid-template-columns:1fr 1fr">
            <div><label>Stock</label><input id="mat-stock" type="number" step="0.0001" placeholder="0.00"></div>
            <div><label>Reorder Level (optional)</label><input id="mat-reorder" type="number" step="0.01" placeholder="e.g., 100"></div>
          </div>
          <div style="display:grid;gap:10px;grid-template-columns:1fr 1fr">
            <div><label>Notes</label><input id="mat-notes" placeholder="Supplier, batch, etc."></div>
            <div><label>&nbsp;</label><button class="btn" id="save-material">Save Material</button></div>
          </div>
        </div>
      </div>
      <div class="card">
        <h2>Materials</h2>
        <div style="display:grid;gap:10px;grid-template-columns:1fr auto">
          <input id="mat-search" placeholder="Search materials">
          <button class="btn ghost mini" id="refresh">Refresh</button>
        </div>
        <div id="materials-table"></div>
      </div>
    </section>

    <section id="tab-formulations" class="grid grid-2" style="display:none">
      <div class="card">
        <h2>New / Edit Formulation</h2>
        <div class="grid">
          <div style="display:grid;gap:10px;grid-template-columns:1fr 1fr">
            <div><label>Formula Name</label><input id="for-name" placeholder="e.g., Amber Test v2"></div>
            <div><label>Notes</label><input id="for-notes" placeholder="e.g., concentrate @25%"></div>
          </div>
          <div>
            <label style="display:flex;align-items:baseline;gap:8px">Ingredients (<span id="for-unit-label">%</span> of batch)<select id="for-unit-mode" class="unit-chip" style="margin-left:8px;width:72px;height:28px;padding:2px 6px;font-size:12px;border-radius:6px"><option value="%">%</option><option value="ml">ml</option></select></label>
            <div id="for-items"></div>
            <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
              <button class="btn ghost" id="for-add-row">+ Add Row</button>
              <span class="pill" id="for-total">Total: 0%</span>
            </div>
          </div>
          <div style="display:grid;gap:10px;grid-template-columns:1fr 1fr">
            <div></div><div><button class="btn" id="for-save">Save Formulation</button></div>
          </div>
        </div>
      </div>
      <div class="card">
        <h2>Formulations</h2>
        <div style="display:grid;gap:10px;grid-template-columns:1fr auto">
          <input id="for-search" placeholder="Search formulations">
          <button class="btn ghost mini" id="for-refresh">Refresh</button>
        </div>
        <div id="formulations-table"></div>
      </div>
    </section>

    <section id="tab-produce" class="grid grid-2" style="display:none">
      <div class="card">
        <h2>New Production / Test Run</h2>
        <div class="grid">
          <div style="display:grid;gap:10px;grid-template-columns:1fr 1fr">
            <div><label>Formulation</label><select id="prod-formulation"></select></div>
            <div style="display:grid;gap:10px;grid-template-columns:1fr 1fr">
              <div><label>Batch Size</label><input id="prod-size" type="number" step="0.0001" placeholder="20"></div>
              <div><label>Unit</label><select id="prod-unit"><option>ml</option><option>g</option></select></div>
            </div>
          </div>
          <div style="display:grid;gap:10px;grid-template-columns:1fr 1fr">
            <div><label>Run Type</label><select id="prod-type"><option value="test">Test (R&D)</option><option value="production">Production</option></select></div>
            <div><label>Notes (optional)</label><input id="prod-notes" placeholder="e.g., tweak Hedione next time"></div>
          </div>
          <div><label>Requirements</label><div id="prod-reqs" class="muted">Choose formulation and size.</div></div>
          <div style="display:grid;gap:10px;grid-template-columns:1fr 1fr">
            <div></div><div><button class="btn" id="prod-confirm" disabled>Deduct & Log Run</button></div>
          </div>
        </div>
      </div>
      <div class="card"><h2>Low Stock Alerts</h2><div id="low-stock"></div></div>
    </section>

    <section id="tab-history" class="grid" style="display:none">
      <div class="card"><h2>Run History</h2>
        <div style="display:grid;gap:10px;grid-template-columns:1fr auto">
          <input id="hist-search" placeholder="Search by name/type">
          <button class="btn ghost mini" id="hist-refresh">Refresh</button>
        </div>
        <div id="history-table"></div>
      </div>
    </section>

    <section id="tab-settings" class="grid" style="display:none">
      <div class="card">
        <h2>Cloud (Supabase)</h2>
        <div style="display:grid;gap:10px;grid-template-columns:1fr 1fr">
          <div><label>SUPABASE_URL</label><input id="sb-url" placeholder="https://YOUR-PROJECT.supabase.co"></div>
          <div><label>SUPABASE_ANON_KEY</label><input id="sb-key" placeholder="ey..."></div>
        </div>
        <div style="display:grid;gap:10px;grid-template-columns:1fr 1fr">
          <div><button class="btn" id="sb-connect">Connect</button><button class="btn ghost" id="sb-disconnect">Disconnect</button></div>
          <div style="text-align:right"><button class="btn ghost" id="create-org">Create Default Org</button></div>
        </div>
        <div style="display:grid;gap:10px;grid-template-columns:1fr 1fr">
          <div>
            <h3>Auth</h3>
            <div style="display:grid;gap:10px;grid-template-columns:1fr 1fr">
              <input id="auth-email" placeholder="you@company.com"><input id="auth-password" type="password" placeholder="(optional) password">
            </div>
            <div style="display:grid;gap:10px;grid-template-columns:1fr 1fr;margin-top:6px">
              <button class="btn mini" id="sign-in">Sign in</button><button class="btn ghost mini" id="sign-out">Sign out</button>
            </div>
            <div id="me" class="muted">Not signed in</div>
          </div>
        </div>

        <div style="margin-top:10px">
          <h3>Org Tools</h3>
          <div style="display:grid;gap:10px;grid-template-columns:2fr auto">
            <input id="org-id-input" placeholder="Paste org_id (UUID) and click Switch">
            <button class="btn ghost mini" id="org-switch">Switch Org</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>© Kairo Manufacturing — Cloud v6.2</footer>

  <script>
    const $ = s => document.querySelector(s);
    const $$ = s => Array.from(document.querySelectorAll(s));
    const uid = () => crypto.randomUUID();
    const store = { get:(k,f)=>{ try { return JSON.parse(localStorage.getItem(k)) ?? f } catch(e){ return f }}, set:(k,v)=> localStorage.setItem(k, JSON.stringify(v)) };

    const banner = $("#banner");
    const ok = (m) => { banner.textContent=m; banner.className="ok"; banner.style.display="block"; };
    const err = (m) => { banner.textContent=m; banner.className="bad"; banner.style.display="block"; };
    const clearBanner = () => { banner.style.display="none"; banner.textContent=""; banner.className=""; };

    $$("nav button").forEach(btn => btn.addEventListener("click", () => {
      $$("nav button").forEach(b => b.classList.remove("active")); btn.classList.add("active");
      const tab = btn.dataset.tab;
      ["inventory","formulations","produce","history","settings"].forEach(t => $("#tab-"+t).style.display = (t === tab) ? "" : "none");
      if (tab==="inventory") renderMaterials();
      if (tab==="formulations") { loadFormulations(); fillMaterialOptions(); }
      if (tab==="produce") { fillFormulationOptions(); renderLowStock(); renderRequirements(); }
      if (tab==="history") loadHistory();
    }));

    let materials = store.get("materials", []);
    let formulations = [];
    let history = [];
    let orgId = store.get("org_id", null);
    let supa = null;

    function setCloudStatus(txt) {
      const pill = $("#cloud-status");
      pill.textContent = txt;
      pill.className = "pill " + (txt === "Cloud" ? "ok" : "");
    }
    const getCfg = () => ({ url: store.get("sb_url",""), key: store.get("sb_key","") });

    async function connect() {
      const { url, key } = getCfg();
      if (!url || !key) return err("Enter SUPABASE_URL + ANON KEY");
      if (!window.supabase || !window.supabase.createClient) return err("Supabase lib failed to load");
      supa = window.supabase.createClient(url, key);
      setCloudStatus("Cloud"); ok("Connected to Supabase ✅");
      await refreshMaterials(); renderMaterials();
      await loadFormulations(); fillFormulationOptions();
      await loadHistory();
    }
    function disconnect(){ supa=null; setCloudStatus("Local"); clearBanner(); }

    $("#sb-connect").addEventListener("click", async ()=>{ store.set("sb_url", $("#sb-url").value.trim()); store.set("sb_key", $("#sb-key").value.trim()); await connect(); });
    $("#sb-disconnect").addEventListener("click", ()=>disconnect());
    $("#sb-url").value = store.get("sb_url",""); $("#sb-key").value = store.get("sb_key","");

    async function me(){ if(!supa) return null; const { data:{ user } } = await supa.auth.getUser(); return user; }
    $("#sign-in").addEventListener("click", async ()=>{
      if (!supa) return err("Connect Supabase first");
      const email=$("#auth-email").value.trim(); const password=$("#auth-password").value.trim();
      if(!email) return err("Enter email");
      let res;
      if(password){ res=await supa.auth.signInWithPassword({email,password}); if(res.error) return err(res.error.message); }
      else { res=await supa.auth.signInWithOtp({email, options:{emailRedirectTo: location.href}}); if(res.error) return err(res.error.message); ok("Magic link sent to "+email); }
      const u=await me(); $("#me").textContent = u?("Signed in as "+u.email):"Not signed in";
    });
    $("#sign-out").addEventListener("click", async()=>{ if(!supa) return; await supa.auth.signOut(); $("#me").textContent="Not signed in"; ok("Signed out"); });

    $("#org-switch").addEventListener("click", ()=>{
      const v = $("#org-id-input").value.trim();
      if(!v) return err("Paste an org_id first");
      try{ store.set("org_id", v); orgId=v; ok("Org set to: "+v); } catch(e){ return err("Invalid org id"); }
    });
    $("#create-org").addEventListener("click", async ()=>{
      if(!supa) return err("Connect Supabase first");
      const u=await me(); if(!u) return err("Sign in first");
      try{
        if(!orgId){
          const { data:o, error:e } = await supa.from("orgs").insert({ name:"Kairo" }).select().single();
          if(e) throw e; orgId=o.id; store.set("org_id", orgId);
        }
        await supa.from("org_members").upsert({ org_id:orgId, user_id:(await me()).id, role:"admin" });
        ok("Org ready: "+orgId);
      }catch(e){ err(e.message || e); }
    });

    function renderMaterials(){
      const q = $("#mat-search").value?.trim().toLowerCase()||"";
      const rows = materials.filter(m=>(m.name?.toLowerCase().includes(q)||(m.notes||"").toLowerCase().includes(q)));
      if(!rows.length){ $("#materials-table").innerHTML='<div class="muted">No materials.</div>'; return; }
      const t=['<table><thead><tr><th>Name</th><th class="right">Stock</th><th>Unit</th><th>Reorder</th><th>Notes</th><th></th></tr></thead><tbody>'];
      for(const m of rows){
        t.push(`<tr><td>${m.name}</td><td class="right">${(m.stock||0).toLocaleString(undefined,{maximumFractionDigits:4})}</td><td>${m.unit}</td><td>${m.reorder ?? '-'}</td><td class="muted">${m.notes||''}</td>
        <td><button class="btn ghost mini" data-act="set" data-id="${m.id}">Set</button><button class="btn ghost mini" data-act="edit" data-id="${m.id}">Edit</button><button class="btn ghost mini" data-act="del" data-id="${m.id}">Delete</button></td></tr>`);
      }
      t.push('</tbody></table>'); $("#materials-table").innerHTML=t.join("");
      $("#materials-table").querySelectorAll("button").forEach(b=>{
        const id=b.getAttribute("data-id"), act=b.getAttribute("data-act");
        b.addEventListener("click", async()=>{
          const m = materials.find(x=>x.id===id); if(!m) return;
          if(act==="set"){
            const v=parseFloat(prompt("Set stock to:", m.stock||0)); if(isNaN(v)) return; m.stock=Math.round(v*10000)/10000;
            if(supa){ await supa.from("materials").upsert({ id:m.id, org_id:orgId, name:m.name, unit:m.unit, stock:m.stock, reorder:m.reorder, notes:m.notes }); await refreshMaterials(); ok("Stock updated"); }
            else { store.set("materials", materials); }
            renderMaterials();
          } else if(act==="edit"){
            $("#mat-name").value=m.name; $("#mat-unit").value=m.unit; $("#mat-stock").value=m.stock||0; $("#mat-reorder").value=m.reorder||""; $("#mat-notes").value=m.notes||""; $("#save-material").dataset.editing=id; window.scrollTo({top:0,behavior:"smooth"});
          } else if(act==="del"){
            if(!confirm("Delete material?")) return;
            if(supa){ await supa.from("materials").delete().eq("id",id).eq("org_id",orgId); await refreshMaterials(); ok("Deleted"); }
            else { materials = materials.filter(x=>x.id!==id); store.set("materials", materials); }
            renderMaterials();
          }
        });
      });
    }
    $("#save-material").addEventListener("click", async()=>{
      const name=$("#mat-name").value.trim(), unit=$("#mat-unit").value; const stock=parseFloat($("#mat-stock").value)||0; const reorder=$("#mat-reorder").value?parseFloat($("#mat-reorder").value):null; const notes=$("#mat-notes").value.trim();
      if(!name) return err("Name required");
      const editing=$("#save-material").dataset.editing;
      if(supa){
        if(!orgId) return err("Create Default Org first");
        if(editing){ const m=materials.find(x=>x.id===editing); Object.assign(m,{name,unit,stock,reorder,notes}); await supa.from("materials").upsert({ id:m.id, org_id:orgId, name, unit, stock, reorder, notes }); $("#save-material").dataset.editing=""; }
        else { await supa.from("materials").insert({ org_id:orgId, name, unit, stock, reorder, notes }); }
        await refreshMaterials(); renderMaterials(); ok("Saved to cloud");
      }else{
        if(editing){ const m=materials.find(x=>x.id===editing); Object.assign(m,{name,unit,stock,reorder,notes}); $("#save-material").dataset.editing=""; }
        else { materials.unshift({ id:uid(), name, unit, stock, reorder, notes }); }
        store.set("materials", materials); renderMaterials(); ok("Saved locally");
      }
      $("#mat-name").value=""; $("#mat-unit").value="ml"; $("#mat-stock").value=""; $("#mat-reorder").value=""; $("#mat-notes").value="";
    });
    $("#mat-search").addEventListener("input", renderMaterials);
    $("#refresh").addEventListener("click", async()=>{ await refreshMaterials(); renderMaterials(); });

    async function refreshMaterials(){
      if(!supa) return;
      const u=await me(); if(!u) { $("#materials-table").innerHTML='<div class="muted">Sign in to load cloud inventory.</div>'; return; }
      if(!orgId){ $("#materials-table").innerHTML='<div class="muted">Set or Create an Org in Settings.</div>'; return; }
      const { data, error } = await supa.from("materials").select("*").eq("org_id", orgId).order("name", {ascending:true});
      if(error) return err(error.message);
      materials = data || []; store.set("materials", materials);
    }

    function rowItem(){ return `<div data-row style="display:grid;gap:8px;grid-template-columns:1.4fr 0.8fr auto"><select class="for-mat"></select><input class="for-qty" type="number" step="0.0001" placeholder="% of batch"><button class="btn ghost" data-act="del-row">Delete</button></div>`; }
    function fillMaterialOptions(){ $$("#for-items select.for-mat").forEach(sel=>{ const keep=sel.value; sel.innerHTML=materials.map(m=>`<option value="${m.id}">${m.name} (${m.unit})</option>`).join(""); if(keep) sel.value=keep; }); }
    function newForRow(){ $("#for-items").insertAdjacentHTML("beforeend", rowItem()); const row=$$("#for-items [data-row]").slice(-1)[0]; const sel=row.querySelector(".for-mat"); sel.innerHTML=materials.map(m=>`<option value="${m.id}">${m.name} (${m.unit})</option>`).join(""); row.querySelector('[data-act="del-row"]').addEventListener("click",()=>{ row.remove(); updateForTotal(); }); row.querySelector(".for-qty").addEventListener("input", updateForTotal); updateForTotal(); }
    
    function updateForTotal(){
      const mode = (localStorage.getItem('formula_unit') || '%');
      const qtys = Array.from(document.querySelectorAll('#for-items .for-qty')).map(x=>parseFloat(x.value)||0);
      if(mode === '%'){
        const p = qtys.reduce((a,b)=>a+b,0);
        const pill=$("#for-total");
        pill.textContent="Total: "+(Math.round(p*10000)/10000)+"%";
        pill.className="pill "+(Math.abs(p-100)<0.0001?"ok":(p>100?"bad":"warn"));
        const lab = $("#for-unit-label"); if(lab) lab.textContent = "%";
        document.querySelectorAll('#for-items .for-qty').forEach(inp=>{inp.placeholder='% of batch'; inp.step='0.0001';});
      } else {
        const ml = qtys.reduce((a,b)=>a+b,0);
        const pill=$("#for-total");
        pill.textContent="Total: "+(Math.round(ml*10000)/10000)+" ml";
        pill.className="pill "+(ml>0?"ok":"warn");
        const lab = $("#for-unit-label"); if(lab) lab.textContent = "ml";
        document.querySelectorAll('#for-items .for-qty').forEach(inp=>{inp.placeholder='ml of batch'; inp.step='0.0001';});
      }
    }
    
    $("#for-add-row").addEventListener("click", newForRow);
    // Unit mode selector for formulation quantities
    const forUnitSelHandler = () => {
      const v = $("#for-unit-mode")?.value || '%';
      localStorage.setItem('formula_unit', v);
      updateForTotal();
    };
    document.addEventListener('DOMContentLoaded', ()=>{
      const saved = localStorage.getItem('formula_unit') || '%';
      const sel = $("#for-unit-mode"); if(sel){ sel.value = saved; sel.addEventListener('change', forUnitSelHandler); }
      updateForTotal();
    });


    async function loadFormulations(){
      if(!supa || !orgId) { formulations=[]; renderFormulations(); return; }
      const { data, error } = await supa.from("formulations").select("*").eq("org_id", orgId).order("created_at",{ascending:false});
      if(error) return err(error.message);
      formulations = data || []; renderFormulations();
    }
    function renderFormulations(){
      const q=$("#for-search").value?.trim().toLowerCase()||"";
      const rows=formulations.filter(f=>(f.name?.toLowerCase().includes(q) || (f.notes||"").toLowerCase().includes(q)));
      if(!rows.length){ $("#formulations-table").innerHTML='<div class="muted">No formulations yet.</div>'; return; }
      const t=['<table><thead><tr><th>Name</th><th>Notes</th><th></th></tr></thead><tbody>'];
      rows.forEach(f=>t.push(`<tr><td><strong>${f.name}</strong></td><td class="muted">${f.notes||''}</td><td>
        <button class="btn ghost mini" data-act="load" data-id="${f.id}">Edit</button>
        <button class="btn ghost mini" data-act="del" data-id="${f.id}">Delete</button>
      </td></tr>`));
      t.push('</tbody></table>');
      $("#formulations-table").innerHTML=t.join("");
      $("#formulations-table").querySelectorAll("button").forEach(b=>{
        const id=b.getAttribute("data-id"), act=b.getAttribute("data-act");
        b.addEventListener("click", async()=>{
          if(act==="del"){ if(!confirm("Delete formulation?")) return; await supa.from("formulations").delete().eq("id", id).eq("org_id", orgId); await loadFormulations(); ok("Deleted"); }
          else if(act==="load"){ const f=formulations.find(x=>x.id===id); if(!f) return; $("#for-name").value=f.name; $("#for-notes").value=f.notes||""; $("#for-items").innerHTML="";
            const { data:items } = await supa.from("formulation_items").select("*").eq("formulation_id", id);
            (items||[]).forEach(it=>{ newForRow(); const row=$$("#for-items [data-row]").slice(-1)[0]; row.querySelector(".for-mat").value=it.material_id; row.querySelector(".for-qty").value=it.percent; });
            updateForTotal();
          }
        });
      });
    }
    $("#for-search").addEventListener("input", renderFormulations);
    $("#for-refresh").addEventListener("click", async()=>{ await loadFormulations(); });

    $("#for-save").addEventListener("click", async()=>{
      const name=$("#for-name").value.trim(); if(!name) return err("Name required");
      const rows=$$("#for-items [data-row]"); if(!rows.length) return err("Add ingredients");
      const mode = (localStorage.getItem('formula_unit') || '%');
      const raw = rows.map(r=>({ material_id:r.querySelector('.for-mat').value, qty:parseFloat(r.querySelector('.for-qty').value)||0 }));
      let items;
      if(mode === '%'){
        const total = raw.reduce((a,b)=>a+b.qty,0);
        if(Math.abs(total-100)>0.01) return err('Percentages must add to 100');
        items = raw.map(it=>({ material_id: it.material_id, percent: it.qty }));
      } else {
        const totalMl = raw.reduce((a,b)=>a+b.qty,0);
        if(totalMl <= 0) return err('Enter positive ml values');
        items = raw.map(it=>({ material_id: it.material_id, percent: Math.round((it.qty/totalMl)*100*10000)/10000 }));
      }
      const notes=$("#for-notes").value.trim();
      const { data:existing } = await supa.from("formulations").select("*").eq("org_id",orgId).eq("name",name).maybeSingle();
      let fid = existing?.id;
      if(!fid){ const ins = await supa.from("formulations").insert({ org_id:orgId, name, notes }).select().single(); if(ins.error) return err(ins.error.message); fid=ins.data.id; }
      else { const up = await supa.from("formulations").update({ notes }).eq("id",fid); if(up.error) return err(up.error.message); await supa.from("formulation_items").delete().eq("formulation_id", fid); }
      const rowsToInsert = items.map(it=>({ formulation_id: fid, material_id: it.material_id, percent: it.percent }));
      const { error:e2 } = await supa.from("formulation_items").insert(rowsToInsert);
      if(e2) return err(e2.message);
      await loadFormulations(); ok("Formulation saved");
      $("#for-name").value=""; $("#for-notes").value=""; $("#for-items").innerHTML=""; updateForTotal();
    });

    function fillFormulationOptions(){ $("#prod-formulation").innerHTML=formulations.map(f=>`<option value="${f.id}">${f.name}</option>`).join(""); }
    async function renderRequirements(){
      const id=$("#prod-formulation").value; const size=parseFloat($("#prod-size").value)||0; const unit=$("#prod-unit").value;
      if(!id||!size){ $("#prod-reqs").innerHTML='<div class="muted">Select formulation and enter batch size.</div>'; $("#prod-confirm").disabled=true; return; }
      const { data:items } = await supa.from("formulation_items").select("*").eq("formulation_id", id);
      let okAll=true; const t=['<table><thead><tr><th>Material</th><th class="right">Required</th><th>Unit</th><th class="right">In Stock</th><th class="right">Balance</th></tr></thead><tbody>'];
      for(const it of (items||[])){
        const m = materials.find(x=>x.id===it.material_id); const req = Math.round(size*(it.percent/100)*10000)/10000; const bal = Math.round(((m?.stock||0)-req)*10000)/10000;
        if(bal<0) okAll=false;
        t.push(`<tr><td>${m?m.name:'Unknown'}</td><td class="right">${req}</td><td>${m?m.unit:unit}</td><td class="right">${(m?.stock||0)}</td><td class="right ${bal<0?'bad':''}">${bal}</td></tr>`);
      }
      t.push('</tbody></table>');
      const status = okAll ? `<span class="pill ok">All good — you can produce</span>` : `<span class="pill bad">Insufficient stock</span>`;
      $("#prod-reqs").innerHTML = status + t.join("");
      $("#prod-confirm").disabled = !okAll;
      $("#prod-confirm").dataset.fid = id; $("#prod-confirm").dataset.size=size; $("#prod-confirm").dataset.unit=unit;
    }
    $("#prod-formulation").addEventListener("change", renderRequirements);
    $("#prod-size").addEventListener("input", renderRequirements);
    $("#prod-unit").addEventListener("change", renderRequirements);

    $("#prod-confirm").addEventListener("click", async()=>{
      const fid = $("#prod-confirm").dataset.fid; const size = parseFloat($("#prod-confirm").dataset.size)||0; const unit=$("#prod-confirm").dataset.unit; const type=$("#prod-type").value; const notes=$("#prod-notes").value.trim();
      if(!fid || size<=0) return err("Select formulation and size");
      const { data:items, error:e } = await supa.from("formulation_items").select("*").eq("formulation_id", fid);
      if(e) return err(e.message);
      for(const it of items){ const m=materials.find(x=>x.id===it.material_id); const req=size*(it.percent/100); if((m?.stock||0) < req-1e-9) return err("Stock changed; refresh and try again"); }
      const f = formulations.find(x=>x.id===fid);
      const { data:runRes, error:eRun } = await supa.from("runs").insert({ org_id:orgId, formulation_id: fid, name: f.name, batch_size: size, unit, notes, type }).select().single();
      if(eRun) return err(eRun.message);
      const runId = runRes.id;
      const deductions = [];
      for(const it of items){
        const m = materials.find(x=>x.id===it.material_id); const req=Math.round(size*(it.percent/100)*10000)/10000;
        const newStock = Math.round(((m.stock||0)-req)*10000)/10000;
        await supa.from("materials").update({ stock:newStock }).eq("id", m.id).eq("org_id", orgId);
        deductions.push({ run_id: runId, material_id: m.id, amount: req, percent: it.percent });
      }
      if(deductions.length){ await supa.from("run_deductions").insert(deductions); }
      await refreshMaterials(); renderMaterials(); await loadHistory(); ok("Run logged & stock deducted");
      $("#prod-size").value=""; $("#prod-notes").value=""; renderRequirements();
    });

    function renderLowStock(){
      const low = materials.filter(m=>m.reorder && (m.stock||0)<=m.reorder);
      if(!low.length){ $("#low-stock").innerHTML='<div class="muted">No low stock alerts.</div>'; return; }
      const t=['<table><thead><tr><th>Material</th><th class="right">Stock</th><th>Reorder ≤</th><th>Unit</th></tr></thead><tbody>'];
      low.forEach(m=>t.push(`<tr><td>${m.name}</td><td class="right bad">${m.stock}</td><td class="right">${m.reorder}</td><td>${m.unit}</td></tr>`));
      t.push('</tbody></table>'); $("#low-stock").innerHTML=t.join("");
    }

    async function loadHistory(){
      if(!supa || !orgId) { history=[]; renderHistory(); return; }
      const { data, error } = await supa.from("runs").select("*").eq("org_id", orgId).order("created_at", {ascending:false}).limit(100);
      if(error) return err(error.message); history = data || []; renderHistory();
    }
    function renderHistory(){
      const q=$("#hist-search").value?.trim().toLowerCase()||"";
      const rows = history.filter(h => (h.name?.toLowerCase().includes(q) || (h.type||'').toLowerCase().includes(q)));
      if(!rows.length){ $("#history-table").innerHTML='<div class="muted">No runs yet.</div>'; return; }
      const t=['<table><thead><tr><th>Date</th><th>Type</th><th>Formulation</th><th class="right">Batch</th><th>Unit</th><th>Notes</th></tr></thead><tbody>'];
      rows.forEach(h=>{
        const dt = h.created_at ? new Date(h.created_at).toLocaleString() : "";
        t.push(`<tr><td>${dt}</td><td>${h.type||'production'}</td><td>${h.name}</td><td class="right">${h.batch_size}</td><td>${h.unit}</td><td class="muted">${h.notes||''}</td></tr>`);
      });
      t.push('</tbody></table>'); $("#history-table").innerHTML=t.join("");
    }
    $("#hist-search").addEventListener("input", renderHistory);
    $("#hist-refresh").addEventListener("click", async()=>{ await loadHistory(); });

    if(getCfg().url && getCfg().key){ connect(); }
  </script>
</body>
</html>
